<!-- This Is A Example Of 1) STRING INTERPOLATION 游녢游녢游녢游녢 -->

<h1>My Name Is {{name}} & </h1>
<h1>I 仇벒잺 {{love}}</h1>

<!-- This Is A Example Of 2) PROPERTY BINDING 游녢游녢游녢游녢 -->

<input type="text" [value]="address"><br><br>

<!-- This Is A Example Of 3) EVENT BINDING 游녢游녢游녢游녢 -->

<button (click)="age()">Click & See Your Age In Console</button><br><br>

<!-- 九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺 游녤 TWO WAY DATA BINDING 游녣 九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺九껊잺 -->

<input type="text" placeholder="Enter Your City Name" [(ngModel)] ="city"><br><br>
<h1 class="h1">{{city}}</h1>

<!-- This Is A Example Of LAZY LOADING With LINKS (Anchor Tags) 游녢游녢游녢游녢 -->

<a routerLink="/admin/login">click for Admin Login</a><br><br>

<a routerLink="/admin/signup">click for Admin Signup</a><br><br>

<!-- This Is A Example Of LAZY LOADING WITH THE HELP OF FUNCTIONS IN BUTTONS (MAM PREFFERED THIS WAY TO PRACTISE CAUS THIS WAY IS USED IN MANY TYPES OF SOFTWARES IN INDUSTRY)游녢游녢游녢游녢 -->

<button (click) = "login()">Log In</button><br><br>
<button (click) = "signup()">Sign Up</button><br><br>

<!-- This Is A Example Of STRUCTURAL DIRECTIVES 1) *ngIf="" 游녢游녢游녢游녢 -->

<h4 *ngIf="show">This Is Head 1</h4>

<!-- This Is A Example Of TOOGLE EFFECT USING *ngIf="" 游녢游녢游녢游녢 -->

<div class="div" *ngIf="toggle">Toggle Effect</div>
<button (click)="toggleeffect()">Toggle</button>
